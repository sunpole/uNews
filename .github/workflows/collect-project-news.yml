name: Diagnose public project news

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/unews-dry-run"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uNews
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test source and queue rules
        run: npm test

      - name: Scan every public project without publishing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNEWS_DRY_RUN: "1"
        run: npm run publish:all:check
