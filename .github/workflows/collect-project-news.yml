name: Diagnose public project news

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/unews-dry-run"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uNews
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Test source and queue rules
        run: npm test

      - name: Scan every public project without publishing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNEWS_DRY_RUN: "1"
        run: npm run publish:all:check
