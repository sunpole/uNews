name: Quality checks

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "package.json"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "scripts/**"
      - "package.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
