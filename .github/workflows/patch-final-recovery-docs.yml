name: Synchronize final uNews recovery documentation

on:
  push:
    branches:
      - docs/record-v0.3.7-recovery
    paths:
      - .github/workflows/patch-final-recovery-docs.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/record-v0.3.7-recovery
          fetch-depth: 0

      - name: Patch README and image-integrity status
        run: |
          python3 - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          source = readme.read_text(encoding='utf-8')
          old = '''uNews работает как GitHub-first очередь для публичных проектов. Версия `0.3.7` проверяет реальные bytes каждого изображения до FIFO и повторно перед Telegram; версия `0.3.6` сохраняет Git identity до publisher-step, а recovery-state `0.3.5`, FIFO, безопасность и пауза остаются действующими.

Проверено на практике:

- бот публикует текст, одну картинку и Telegram-альбом;
- патчноут `500TD v1.0.2` опубликован с двумя изображениями;
- полный dry-run `0.3.7` проверил 35 публичных проектов: 9 pending, 9 ready, 0 errors;
- dry-run подтвердил пять исправленных uDream-изображений и отсутствие повторной публикации message `54`;
- Telegram preflight подтверждает `@uNewsDev_bot` и канал `@uNewsLog`;
- после каждого успешного поста состояние фиксируется в GitHub;
- при ошибке state сохраняется до завершения workflow.
'''
          new = '''uNews работает как GitHub-first очередь для публичных проектов. Версия `0.3.7` проверяет реальные bytes каждого изображения до FIFO и повторно перед Telegram; версия `0.3.6` сохраняет Git identity до publisher-step, а recovery-state `0.3.5`, FIFO, безопасность и пауза остаются действующими.

Состояние после восстановления 2026-07-22:

- actual-main dry-run: 35 проектов, 10 pending, 10 ready, 0 errors;
- реальный пакет опубликовал messages `55–64` в строгом FIFO;
- `uDream 23.8.0` остался message `54` и не был отправлен повторно;
- каждый из десяти постов получил отдельный Git checkpoint;
- `data/health.json`: `success`, pending `0`, error count `0`, `last_error: null`;
- `data/errors.json`: пустой список;
- служебный Issue №3 закрыт автоматически как completed;
- полный отчёт: [docs/QUEUE_RECOVERY_2026-07-22.md](docs/QUEUE_RECOVERY_2026-07-22.md).

Проверено на практике:

- бот публикует текст, одну картинку и Telegram-альбом;
- патчноут `500TD v1.0.2` опубликован с двумя изображениями;
- Telegram preflight подтверждает `@uNewsDev_bot` и канал `@uNewsLog`;
- damaged PNG с неверным CRC блокируется до Telegram;
- после каждого успешного поста состояние фиксируется в GitHub;
- при ошибке state сохраняется до завершения workflow;
- после успешного восстановления queue alert закрывается автоматически.
'''
          if source.count(old) != 1:
              raise SystemExit('README status block mismatch')
          readme.write_text(source.replace(old, new, 1), encoding='utf-8')

          integrity = Path('docs/IMAGE_INTEGRITY.md')
          source = integrity.read_text(encoding='utf-8')
          marker = '## Постоянные файлы реализации\n'
          if source.count(marker) != 1:
              raise SystemExit('IMAGE_INTEGRITY marker mismatch')
          final = '''## Реальное подтверждение восстановления

После merge `0.3.7` выполнен actual-main dry-run:

```text
projects scanned: 35
new patchnotes: 10
ready in batch: 10
reported errors: 0
would publish: 10
```

Штатный запуск commit `763650e47aada175bd23332c1a9f05d454437e63` опубликовал messages `55–64`. Все десять записей получили отдельные per-post checkpoints.

Финальное состояние commit `064cbde39ca3c46cf746bcce65027eef517f45ef`:

```text
last_attempt_status: success
pending_count: 0
ready_project_count: 0
error_count: 0
last_error: null
errors: []
```

Служебный Issue №3 закрыт автоматически `2026-07-22T11:45:31Z`. Полная последовательность, message URLs и точки восстановления записаны в [QUEUE_RECOVERY_2026-07-22.md](QUEUE_RECOVERY_2026-07-22.md).

'''
          integrity.write_text(source.replace(marker, final + marker, 1), encoding='utf-8')
          PY

      - name: Commit final documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/IMAGE_INTEGRITY.md
          git commit -m "docs: record successful uNews v0.3.7 queue recovery"
          git push origin HEAD:docs/record-v0.3.7-recovery
