name: Audit pending image signatures v0.3.7

on:
  push:
    branches:
      - fix/pending-image-validation-v0.3.7
    paths:
      - .github/workflows/audit-pending-images-v0.3.7.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pending-image-validation-v0.3.7
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests and complete pending-image dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNEWS_DRY_RUN: "1"
        run: |
          mkdir -p diagnostics
          set +e
          npm test > diagnostics/v0.3.7-tests.txt 2>&1
          test_status=$?
          npm run publish:all:check > diagnostics/v0.3.7-pending-images.txt 2>&1
          audit_status=$?
          set -e

          cat > diagnostics/v0.3.7-summary.json <<EOF
          {
            "commit": "$(git rev-parse HEAD)",
            "tests_exit_code": $test_status,
            "audit_exit_code": $audit_status,
            "captured_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          cat diagnostics/v0.3.7-tests.txt
          cat diagnostics/v0.3.7-pending-images.txt
          cat diagnostics/v0.3.7-summary.json

      - name: Commit complete audit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/v0.3.7-tests.txt diagnostics/v0.3.7-pending-images.txt diagnostics/v0.3.7-summary.json
          git commit -m "chore: capture pending image signature audit"
          git push origin HEAD:fix/pending-image-validation-v0.3.7
