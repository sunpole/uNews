name: Render uNews v0.3.7 publication image

on:
  push:
    branches:
      - fix/image-integrity-v0.3.7
    paths:
      - .github/workflows/render-v0.3.7-image.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/image-integrity-v0.3.7
          fetch-depth: 0

      - name: Install deterministic render validators
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin pngcheck imagemagick

      - name: Render and validate PNG
        run: |
          rsvg-convert \
            --width 1200 \
            --height 675 \
            --output news/2026-07-22-unews-v0-3-7-image-integrity.png \
            assets/covers/unews-v0.3.7-image-integrity.svg
          pngcheck -q news/2026-07-22-unews-v0-3-7-image-integrity.png
          identify news/2026-07-22-unews-v0-3-7-image-integrity.png
          dimensions="$(identify -format '%wx%h' news/2026-07-22-unews-v0-3-7-image-integrity.png)"
          test "$dimensions" = "1200x675"
          bytes="$(wc -c < news/2026-07-22-unews-v0-3-7-image-integrity.png)"
          test "$bytes" -ge 30000
          echo "Rendered PNG: ${dimensions}, ${bytes} bytes"

      - name: Commit rendered image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/2026-07-22-unews-v0-3-7-image-integrity.png
          git commit -m "docs: render uNews v0.3.7 image integrity card"
          git push origin HEAD:fix/image-integrity-v0.3.7
