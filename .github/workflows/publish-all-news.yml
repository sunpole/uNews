name: Publish all project news

on:
  push:
    branches: [main]
    paths:
      - ".github/unews-run"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check only, do not publish"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "7 */4 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: unews-publish-all-news
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout uNews
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Test queue and source
        if: ${{ github.event_name != 'schedule' }}
        run: npm test

      - name: Dry-run scan
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNEWS_DRY_RUN: "1"
        run: npm run publish:all:check

      - name: Verify Telegram credentials
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: npm run diagnose:telegram

      - name: Publish new patchnotes
        id: publish
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          UNEWS_MAX_POSTS_PER_RUN: "20"
          UNEWS_TELEGRAM_POST_INTERVAL_MS: "61000"
          UNEWS_GIT_CHECKPOINT: "1"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          before="$(git hash-object data/published.json)"
          npm run publish:all
          after="$(git hash-object data/published.json)"
          if [ "$before" != "$after" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit published state
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        run: |
          if git diff --quiet -- data/; then
            echo "No published state changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update uNews queue state"
          git push

      - name: Report or close queue alert
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="uNews queue requires attention"
          existing="$(gh issue list --state open --json number,title --jq '.[] | select(.title == "uNews queue requires attention") | .number' | head -1)"
          error_count="$(jq '.errors | length' data/errors.json 2>/dev/null || echo 0)"

          if [ "${{ job.status }}" != "success" ] || [ "$error_count" -gt 0 ]; then
            if [ -z "$existing" ]; then
              gh issue create --title "$title" --body "Автоматическая очередь uNews обнаружила ошибку. Откройте последний запуск workflow Publish all project news и файл data/errors.json. Секреты в отчёт не включаются."
            fi
          elif [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Очередь снова проходит проверку без ошибок."
          fi

