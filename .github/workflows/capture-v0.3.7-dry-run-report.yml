name: Capture uNews v0.3.7 dry-run report

on:
  push:
    branches:
      - fix/image-integrity-v0.3.7
    paths:
      - .github/workflows/capture-v0.3.7-dry-run-report.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout exact branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/image-integrity-v0.3.7
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Run tests and full dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNEWS_DRY_RUN: "1"
        run: |
          npm test
          npm run publish:all:check > /tmp/unews-v0.3.7-dry-run.log 2>&1
          cat /tmp/unews-v0.3.7-dry-run.log

      - name: Build concise machine-readable report
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p diagnostics
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          from datetime import datetime, timezone

          text = pathlib.Path('/tmp/unews-v0.3.7-dry-run.log').read_text(encoding='utf-8')

          def required(pattern, label):
              match = re.search(pattern, text)
              if not match:
                  raise SystemExit(f'Missing {label} in dry-run log')
              return match

          projects = int(required(r'Projects to scan: (\d+)', 'project count').group(1))
          queue = required(
              r'New patchnotes found: (\d+)\. Ready in this batch: (\d+)\. Reported errors: (\d+)\.',
              'queue summary',
          )
          would_publish = int(required(r'Would publish (\d+) item\(s\)', 'publish count').group(1))
          items = [
              {'key': key.strip(), 'method': method.strip()}
              for key, method in re.findall(r'^Would publish: (.+?) via (\S+)\s*$', text, re.MULTILINE)
          ]
          blocked = re.findall(r'^Blocked (.+)$', text, re.MULTILINE)

          report = {
              'schema': 1,
              'version': '0.3.7',
              'sourceCommit': os.environ['SOURCE_COMMIT'],
              'generatedAt': datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'tests': 'passed',
              'dryRun': 'passed',
              'projectsScanned': projects,
              'newPatchnotes': int(queue.group(1)),
              'readyInBatch': int(queue.group(2)),
              'reportedErrors': int(queue.group(3)),
              'wouldPublish': would_publish,
              'items': items,
              'blocked': blocked,
          }

          if report['reportedErrors'] != len(blocked):
              raise SystemExit('Reported error count does not match blocked entries')
          if report['wouldPublish'] != len(items):
              raise SystemExit('Would-publish count does not match item list')

          pathlib.Path('diagnostics/v0.3.7-dry-run-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Commit temporary report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/v0.3.7-dry-run-report.json
          git commit -m "chore: capture uNews v0.3.7 dry-run evidence"
          git push origin HEAD:fix/image-integrity-v0.3.7
