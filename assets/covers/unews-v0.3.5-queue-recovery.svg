<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">uNews 0.3.5 — восстановление очереди</title>
  <desc id="desc">Документальный кадр с фактическими результатами диагностики и правилами восстановления очереди.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1090" cy="85" r="180" fill="#2563eb" opacity="0.16"/>
  <circle cx="70" cy="650" r="230" fill="#06b6d4" opacity="0.10"/>

  <text x="72" y="92" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="28" font-weight="700">uNews</text>
  <text x="72" y="148" fill="#f8fafc" font-family="Arial, sans-serif" font-size="50" font-weight="800">Очередь восстановлена</text>
  <text x="72" y="188" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="24">операционный патч 0.3.5 · фактическая диагностика GitHub Actions</text>
  <rect x="72" y="220" width="1056" height="4" rx="2" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="262" width="244" height="154" rx="24" fill="#111c36" stroke="#334155"/>
    <text x="102" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">ГОТОВО К ПУБЛИКАЦИИ</text>
    <text x="102" y="376" fill="#f8fafc" font-family="Arial, sans-serif" font-size="68" font-weight="800">8</text>
    <text x="170" y="376" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="22">патчноутов</text>

    <rect x="340" y="262" width="244" height="154" rx="24" fill="#111c36" stroke="#334155"/>
    <text x="370" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">ТЕСТЫ И DRY-RUN</text>
    <text x="370" y="376" fill="#4ade80" font-family="Arial, sans-serif" font-size="48" font-weight="800">OK</text>
    <text x="450" y="376" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">0 ошибок</text>

    <rect x="608" y="262" width="244" height="154" rx="24" fill="#111c36" stroke="#334155"/>
    <text x="638" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">TELEGRAM PREFLIGHT</text>
    <text x="638" y="360" fill="#4ade80" font-family="Arial, sans-serif" font-size="34" font-weight="800">getMe  OK</text>
    <text x="638" y="394" fill="#4ade80" font-family="Arial, sans-serif" font-size="34" font-weight="800">getChat OK</text>

    <rect x="876" y="262" width="252" height="154" rx="24" fill="#111c36" stroke="#334155"/>
    <text x="906" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">CHECKPOINT</text>
    <text x="906" y="354" fill="#f8fafc" font-family="Arial, sans-serif" font-size="28" font-weight="700">state → commit</text>
    <text x="906" y="390" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="22">до окончательной ошибки</text>
  </g>

  <rect x="72" y="456" width="1056" height="144" rx="28" fill="#0b1224" stroke="#334155"/>
  <text x="108" y="501" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Что исправлено</text>
  <text x="108" y="540" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">• фатальная причина сохраняется в health.json и errors.json без секретов</text>
  <text x="108" y="574" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">• workflow сначала фиксирует data/, затем возвращает ошибку и создаёт один служебный Issue</text>

  <text x="72" y="642" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Источник: фактические GitHub Actions diagnostics ветки fix/queue-recovery-v0.3.5 · 2026-07-22</text>
</svg>
